<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} - {% endif %}应用工程文档</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.toc %}
  <link rel="stylesheet" href="{{ '/assets/css/toc.css' | relative_url }}">
  {% endif %}
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/docs/zh_CN/' | relative_url }}">应用工程文档</a>
    </div>
  </header>

  <main class="page-content">
    <div class="container">
      <div class="sidebar">
        {% include sidebar.html %}
      </div>
      <article class="content">
        {% if page.toc %}
        <div class="toc">
          {{ content | toc_only }}
        </div>
        {% endif %}
        {{ content }}
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} ModelEngine-Group. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
